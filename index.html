<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Predictor - Iniciar Sesión</title>
    <link rel="stylesheet" href="./CSS/Predicciones.css">
    <link rel="icon" type="image/png" href="Imagenes/Logo Principal.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="logo login-title">MXP</div>

        <div id="loginForm" class="profile-card">
            <h2 class="login-heading">Acceso de Usuario</h2>

            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <p id="error-msg" class="error-message">Usuario o contraseña incorrectos.</p>

            <button onclick="iniciarSesion()" id="btn-login" class="predict-btn login-button">Iniciar Sesión</button>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./JS/supabaseConfig.js"></script>
    <script src="./JS/auth.js"></script>
    <script src="./JS/registerServiceWorker.js"></script>
</body>
</html>
